<ossec_config>

  <!--
    PB-01: Phishing Triage & Automated Containment
    SOAR Integration Block
    ================================================
    Forwards all phishing-related alerts (level >= 10)
    to the Shuffle SOAR webhook listener.

    Target groups: phishing, email_security, pb01
    Minimum alert level: 10
    Format: JSON (flat schema for direct variable mapping in Shuffle)
  -->

  <integration>
    <name>custom-webhook</name>
    <hook_url>http://shuffle-backend:5001/api/v1/hooks/webhook_prod_phish_01</hook_url>
    <alert_format>json</alert_format>
    <level>10</level>
    <group>phishing,pb01</group>
  </integration>

</ossec_config>
